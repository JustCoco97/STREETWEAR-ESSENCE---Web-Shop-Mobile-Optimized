<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Streetwear Essence</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background: #000;
        color: #fff;
        font-family: "Inter", sans-serif;
        padding: 15px;
      }
      .admin-wrap {
        max-width: 500px;
        margin: 20px auto;
        background: #0a0a0a;
        padding: 25px;
        border: 1px solid #1a1a1a;
        border-radius: 12px;
      }
      h2 {
        font-weight: 900;
        color: #39ff14;
        font-size: 1.3rem;
        margin-bottom: 20px;
        text-transform: uppercase;
      }
      .label-text {
        font-size: 0.7rem;
        color: #666;
        text-transform: uppercase;
        margin-bottom: 6px;
        display: block;
        font-weight: 800;
      }
      input,
      select {
        width: 100%;
        padding: 14px;
        margin-bottom: 18px;
        background: #111;
        border: 1px solid #222;
        color: #fff;
        border-radius: 6px;
      }
      .btn-pubblica {
        width: 100%;
        padding: 18px;
        background: #39ff14;
        color: #000;
        border: none;
        font-weight: 900;
        cursor: pointer;
        border-radius: 6px;
      }
      #status {
        margin-top: 12px;
        font-weight: bold;
        color: #39ff14;
        text-align: center;
      }
    </style>
  </head>
  <body id="admin-body" style="display: none">
    <div class="admin-wrap">
      <h2>📦 CARICA ARTICOLO</h2>
      <input type="text" id="prod-name" placeholder="NOME PRODOTTO" />
      <span class="label-text">Categoria</span>
      <select id="prod-cat">
        <option value="preferiti">⭐ PREFERITI (Slider)</option>
        <option value="vetrina">💎 VETRINA (Griglia)</option>
        <option value="felpe">FELPE</option>
        <option value="tute">TUTE</option>
        <option value="giubbini">GIUBBINI</option>
        <option value="magliette">MAGLIETTE</option>
        <option value="scarpe">SCARPE</option>
        <option value="cappelli">CAPPELLI</option>
      </select>
      <span class="label-text">Foto Copertina</span>
      <input type="file" id="main-img" accept="image/*" />
      <button class="btn-pubblica" id="upload-btn">🚀 PUBBLICA</button>
      <div id="status"></div>
    </div>

    <script>
      const pass = prompt("Password:");
      if (pass === "essence2026") {
        document.getElementById("admin-body").style.display = "block";
      } else {
        alert("Negato");
        window.location.href = "index.html";
      }
    </script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
      import {
        getFirestore,
        addDoc,
        collection,
      } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
      import {
        getStorage,
        ref,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBv9ZAOQyljdW41ZDTuxNacXzqegXEvn94",
        authDomain: "streetwearessence2026.firebaseapp.com",
        projectId: "streetwearessence2026",
        storageBucket: "streetwearessence2026.firebasestorage.app", // Verificato dallo screenshot
        messagingSenderId: "926228477709",
        appId: "1:926228477709:web:8a15d11ac26022f1fee244",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const storage = getStorage(app);

      document.getElementById("upload-btn").onclick = async () => {
        const name = document.getElementById("prod-name").value;
        const file = document.getElementById("main-img").files[0];
        const status = document.getElementById("status");

        if (!name || !file) return alert("Metti nome e foto!");

        status.innerHTML = "⏳ CARICAMENTO IN CORSO...";
        document.getElementById("upload-btn").disabled = true;

        try {
          // Creazione riferimento cartella prodotti
          const storageRef = ref(
            storage,
            "prodotti/" + Date.now() + "_" + file.name,
          );

          // Upload
          const snapshot = await uploadBytes(storageRef, file);
          const url = await getDownloadURL(snapshot.ref);

          // Salvataggio nel database
          await addDoc(collection(db, "prodotti"), {
            nome: name,
            sezione: document.getElementById("prod-cat").value,
            fotoPrincipale: url,
            data: new Date(),
          });

          status.innerHTML = "✅ SUCCESSO!";
          alert("Fatto! La cartella 'prodotti' è stata aggiornata.");
          location.reload();
        } catch (e) {
          console.error(e);
          alert("Errore: " + e.message);
          status.innerHTML = "❌ ERRORE";
          document.getElementById("upload-btn").disabled = false;
        }
      };
    </script>
  </body>
</html>
