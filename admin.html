<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Essence | Streetwear</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        padding: 15px;
        background: #000;
        color: #fff;
        font-family: "Inter", sans-serif;
      }
      .admin-wrap {
        max-width: 500px;
        margin: 20px auto;
        background: #0a0a0a;
        padding: 25px;
        border: 1px solid #1a1a1a;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      h2 {
        font-weight: 900;
        color: #39ff14;
        font-size: 1.4rem;
        margin-bottom: 25px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .label-text {
        font-size: 0.7rem;
        color: #666;
        text-transform: uppercase;
        margin-bottom: 8px;
        display: block;
        font-weight: 800;
        letter-spacing: 1px;
      }
      input,
      select {
        width: 100%;
        padding: 15px;
        margin-bottom: 20px;
        background: #111;
        border: 1px solid #222;
        color: #fff;
        font-weight: bold;
        border-radius: 6px;
        font-family: "Inter";
      }
      .upload-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 10px;
      }
      .btn-pubblica {
        width: 100%;
        padding: 20px;
        background: #39ff14;
        color: #000;
        border: none;
        font-weight: 900;
        cursor: pointer;
        text-transform: uppercase;
        margin-top: 10px;
        border-radius: 6px;
      }
      .gestione-prodotti {
        margin-top: 40px;
        border-top: 1px solid #222;
        padding-top: 20px;
      }
      .item-gestione {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #111;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 6px;
        border-left: 4px solid #39ff14;
      }
      .btn-elimina {
        background: #ff3131;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 900;
        font-size: 0.7rem;
      }
      #panel {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="admin-wrap" id="login-section">
      <h2>AREA RISERVATA</h2>
      <input type="password" id="pass" placeholder="Password" />
      <button class="btn-pubblica" onclick="accedi()">ENTRA</button>
    </div>

    <div class="admin-wrap" id="panel">
      <h2>CARICA ARTICOLO</h2>

      <span class="label-text">Nome Prodotto</span>
      <input type="text" id="prod-name" placeholder="es: FELPA LOGO TRAP" />

      <span class="label-text">Categoria (Dove apparirà?)</span>
      <select id="prod-cat">
        <option value="preferiti">I NOSTRI PREFERITI 🔥 (Home Slider)</option>
        <option value="vetrina">TUTTI I PRODOTTI 💎 (Home Basso)</option>
        <option value="felpe">FELPE</option>
        <option value="tute">TUTE</option>
        <option value="giubbini">GIUBBINI</option>
        <option value="magliette">MAGLIETTE</option>
        <option value="scarpe">SCARPE</option>
        <option value="cappelli">CAPPELLI</option>
      </select>

      <span class="label-text">Foto Copertina</span>
      <input type="file" id="main-img" accept="image/*" />

      <span class="label-text">Altre 5 foto dettagli</span>
      <div class="upload-grid">
        <input type="file" class="extra-img" accept="image/*" />
        <input type="file" class="extra-img" accept="image/*" />
        <input type="file" class="extra-img" accept="image/*" />
        <input type="file" class="extra-img" accept="image/*" />
        <input type="file" class="extra-img" accept="image/*" />
      </div>

      <button class="btn-pubblica" id="upload-btn">PUBBLICA SUL SITO</button>
      <div
        id="status"
        style="margin-top: 10px; font-weight: bold; color: #39ff14"
      ></div>

      <div class="gestione-prodotti">
        <h2>GESTISCI ONLINE</h2>
        <div id="lista-prodotti"></div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
      import {
        getFirestore,
        addDoc,
        collection,
        deleteDoc,
        doc,
        onSnapshot,
        query,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
      import {
        getStorage,
        ref,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBv9ZAOQyljdW41ZDTuxNacXzqegXEvn94",
        authDomain: "streetwearessence2026.firebaseapp.com",
        projectId: "streetwearessence2026",
        storageBucket: "streetwearessence2026.firebasestorage.app",
        messagingSenderId: "926228477709",
        appId: "1:926228477709:web:8a15d11ac26022f1fee244",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const storage = getStorage(app);

      window.accedi = function () {
        if (document.getElementById("pass").value === "essence2026") {
          document.getElementById("login-section").style.display = "none";
          document.getElementById("panel").style.display = "block";
          caricaProdottiGestione();
        }
      };

      function caricaProdottiGestione() {
        const q = query(collection(db, "prodotti"), orderBy("data", "desc"));
        onSnapshot(q, (snapshot) => {
          const lista = document.getElementById("lista-prodotti");
          lista.innerHTML = "";
          snapshot.forEach((docSnap) => {
            const p = docSnap.data();
            lista.innerHTML += `
              <div class="item-gestione">
                <div class="item-info">${p.nome} <br><span style="color:#666; font-size:10px;">${p.sezione.toUpperCase()}</span></div>
                <button class="btn-elimina" onclick="eliminaProdotto('${docSnap.id}')">ELIMINA</button>
              </div>`;
          });
        });
      }

      window.eliminaProdotto = async (id) => {
        if (confirm("Vuoi davvero eliminarlo?"))
          await deleteDoc(doc(db, "prodotti", id));
      };

      document.getElementById("upload-btn").onclick = async () => {
        const status = document.getElementById("status");
        const name = document.getElementById("prod-name").value;
        const sezione = document.getElementById("prod-cat").value;
        const mainImgFile = document.getElementById("main-img").files[0];
        const extraFiles = document.querySelectorAll(".extra-img");

        if (!name || !mainImgFile) {
          alert("Nome e Foto principale obbligatori!");
          return;
        }

        status.innerHTML = "CARICAMENTO IN CORSO... ⏳";

        try {
          const mainRef = ref(storage, `prodotti/${Date.now()}_main`);
          await uploadBytes(mainRef, mainImgFile);
          const mainUrl = await getDownloadURL(mainRef);

          let extraUrls = [];
          for (let input of extraFiles) {
            if (input.files[0]) {
              const extraRef = ref(
                storage,
                `prodotti/${Date.now()}_${Math.random()}`,
              );
              await uploadBytes(extraRef, input.files[0]);
              const url = await getDownloadURL(extraRef);
              extraUrls.push(url);
            }
          }

          await addDoc(collection(db, "prodotti"), {
            nome: name,
            sezione: sezione,
            fotoPrincipale: mainUrl,
            fotoExtra: extraUrls,
            data: new Date(),
          });

          status.innerHTML = "ARTICOLO PUBBLICATO! ✅";
          document.getElementById("prod-name").value = "";
          document.getElementById("main-img").value = "";
          extraFiles.forEach((i) => (i.value = ""));
        } catch (e) {
          status.innerHTML = "ERRORE ❌";
        }
      };
    </script>
  </body>
</html>
