<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Streetwear Essence</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background: #000;
        color: #fff;
        font-family: "Inter", sans-serif;
        padding: 15px;
      }

      /* SCHERMATA LOGIN */
      #login-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .login-box {
        background: #0a0a0a;
        padding: 40px;
        border: 1px solid #1a1a1a;
        border-radius: 12px;
        max-width: 350px;
        width: 90%;
      }

      .admin-wrap {
        max-width: 500px;
        margin: 20px auto;
        background: #0a0a0a;
        padding: 25px;
        border: 1px solid #1a1a1a;
        border-radius: 12px;
      }
      h2,
      h1 {
        font-weight: 900;
        color: #39ff14;
        text-transform: uppercase;
      }
      h2 {
        font-size: 1.3rem;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 10px;
      }

      .label-text {
        font-size: 0.7rem;
        color: #666;
        text-transform: uppercase;
        margin-bottom: 6px;
        display: block;
        font-weight: 800;
      }
      input,
      select {
        width: 100%;
        padding: 14px;
        margin-bottom: 18px;
        background: #111;
        border: 1px solid #222;
        color: #fff;
        border-radius: 6px;
        box-sizing: border-box; /* Evita che l'input esca dai bordi */
      }
      .btn-pubblica,
      .btn-login {
        width: 100%;
        padding: 18px;
        background: #39ff14;
        color: #000;
        border: none;
        font-weight: 900;
        cursor: pointer;
        border-radius: 6px;
        text-transform: uppercase;
      }
      #status {
        margin-top: 12px;
        font-weight: bold;
        color: #39ff14;
        text-align: center;
      }
      .btn-torna {
        display: block;
        text-align: center;
        color: #555;
        text-decoration: none;
        font-size: 12px;
        margin-top: 20px;
        font-weight: bold;
      }
      .btn-torna:hover {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="login-overlay">
      <div class="login-box">
        <h1>AREA ADMIN</h1>
        <p
          style="
            color: #444;
            font-size: 0.8rem;
            margin-bottom: 25px;
            font-weight: bold;
          "
        >
          STREETWEAR ESSENCE
        </p>
        <input
          type="password"
          id="pass-field"
          placeholder="PASSWORD"
          style="text-align: center"
        />
        <button class="btn-login" id="login-btn">ENTRA</button>
        <p
          id="error-msg"
          style="color: red; font-size: 12px; margin-top: 15px; display: none"
        >
          Password errata, riprova.
        </p>
      </div>
    </div>

    <div class="admin-wrap">
      <h2>📦 CARICA ARTICOLO</h2>
      <input type="text" id="prod-name" placeholder="NOME PRODOTTO" />
      <span class="label-text">Categoria</span>
      <select id="prod-cat">
        <option value="preferiti">⭐ PREFERITI (Slider)</option>
        <option value="vetrina">💎 VETRINA (Griglia)</option>
        <option value="felpe">FELPE</option>
        <option value="tute">TUTE</option>
        <option value="giubbini">GIUBBINI</option>
        <option value="magliette">MAGLIETTE</option>
        <option value="scarpe">SCARPE</option>
        <option value="cappelli">CAPPELLI</option>
      </select>
      <span class="label-text">Foto Copertina</span>
      <input type="file" id="main-img" accept="image/*" />
      <button class="btn-pubblica" id="upload-btn">🚀 PUBBLICA</button>
      <div id="status"></div>
      <a href="index.html" class="btn-torna">← Torna al sito</a>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
      import {
        getFirestore,
        addDoc,
        collection,
      } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
      import {
        getStorage,
        ref,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBv9ZAOQyljdW41ZDTuxNacXzqegXEvn94",
        authDomain: "streetwearessence2026.firebaseapp.com",
        projectId: "streetwearessence2026",
        storageBucket: "streetwearessence2026.firebasestorage.app",
        messagingSenderId: "926228477709",
        appId: "1:926228477709:web:8a15d11ac26022f1fee244",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const storage = getStorage(app);

      // --- LOGICA LOGIN ---
      const loginBtn = document.getElementById("login-btn");
      const passField = document.getElementById("pass-field");
      const overlay = document.getElementById("login-overlay");
      const errorMsg = document.getElementById("error-msg");

      function controllaAccesso() {
        if (passField.value === "essence2026") {
          overlay.style.display = "none";
        } else {
          errorMsg.style.display = "block";
          passField.value = "";
        }
      }

      loginBtn.onclick = controllaAccesso;
      passField.addEventListener("keypress", (e) => {
        if (e.key === "Enter") controllaAccesso();
      });

      // --- LOGICA UPLOAD (QUELLA CHE GIA' FUNZIONA) ---
      document.getElementById("upload-btn").onclick = async () => {
        const name = document.getElementById("prod-name").value;
        const file = document.getElementById("main-img").files[0];
        const status = document.getElementById("status");

        if (!name || !file) return alert("Metti nome e foto!");

        status.innerHTML = "⏳ CARICAMENTO IN CORSO...";
        document.getElementById("upload-btn").disabled = true;

        try {
          const storageRef = ref(
            storage,
            "prodotti/" + Date.now() + "_" + file.name,
          );
          const snapshot = await uploadBytes(storageRef, file);
          const url = await getDownloadURL(snapshot.ref);

          await addDoc(collection(db, "prodotti"), {
            nome: name,
            sezione: document.getElementById("prod-cat").value,
            fotoPrincipale: url,
            data: new Date(),
          });

          status.innerHTML = "✅ PUBBLICATO!";
          document.getElementById("prod-name").value = "";
          document.getElementById("main-img").value = "";
          document.getElementById("upload-btn").disabled = false;
        } catch (e) {
          console.error(e);
          status.innerHTML = "❌ ERRORE: " + e.message;
          document.getElementById("upload-btn").disabled = false;
        }
      };
    </script>
  </body>
</html>
