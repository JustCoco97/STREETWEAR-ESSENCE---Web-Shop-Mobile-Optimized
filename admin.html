<script type="module">
  // SCRIPT PASS PROTEZIONE
  window.addEventListener("DOMContentLoaded", () => {
    const pass = prompt("Password Amministratore:");
    if (pass === "essence2026") {
      document.body.style.display = "block";
    } else {
      alert("Accesso negato!");
      window.location.href = "index.html";
    }
  });

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
  import {
    getFirestore,
    addDoc,
    collection,
    deleteDoc,
    doc,
    onSnapshot,
    query,
    orderBy,
  } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
  import {
    getStorage,
    ref,
    uploadBytes,
    getDownloadURL,
  } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBv9ZAOQyljdW41ZDTuxNacXzqegXEvn94",
    authDomain: "streetwearessence2026.firebaseapp.com",
    projectId: "streetwearessence2026",
    storageBucket: "streetwearessence2026.firebasestorage.app",
    messagingSenderId: "926228477709",
    appId: "1:926228477709:web:8a15d11ac26022f1fee244",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  function caricaProdotti() {
    const q = query(collection(db, "prodotti"), orderBy("data", "desc"));
    onSnapshot(q, (snapshot) => {
      const lista = document.getElementById("lista-prodotti");
      lista.innerHTML = "";
      snapshot.forEach((docSnap) => {
        const p = docSnap.data();
        lista.innerHTML += `
              <div class="item-gestione">
                <div class="item-info">${p.nome} <span>${p.sezione.toUpperCase()}</span></div>
                <button class="btn-elimina" onclick="eliminaProdotto('${docSnap.id}')">ELIMINA</button>
              </div>`;
      });
    });
  }
  caricaProdotti();

  window.eliminaProdotto = async (id) => {
    if (confirm("Vuoi davvero eliminare questo prodotto?")) {
      await deleteDoc(doc(db, "prodotti", id));
    }
  };

  document.getElementById("upload-btn").onclick = async () => {
    const status = document.getElementById("status");
    const name = document.getElementById("prod-name").value.trim();
    const sezione = document.getElementById("prod-cat").value;
    const mainImgFile = document.getElementById("main-img").files[0];
    const extraFiles = document.querySelectorAll(".extra-img");

    if (!name || !mainImgFile) {
      alert("⚠️ Nome e Foto copertina sono obbligatori!");
      return;
    }

    status.innerHTML = "⏳ CARICAMENTO IN CORSO...";
    document.getElementById("upload-btn").disabled = true;

    try {
      // 1. Caricamento Foto Principale
      const mainPath = "prodotti/" + Date.now() + "_main";
      const mainRef = ref(storage, mainPath);
      const mainSnapshot = await uploadBytes(mainRef, mainImgFile);
      const mainUrl = await getDownloadURL(mainSnapshot.ref);

      // 2. Caricamento Foto Extra
      let extraUrls = [];
      for (let input of extraFiles) {
        if (input.files[0]) {
          const extraPath = "prodotti/" + Date.now() + "_" + Math.random();
          const extraRef = ref(storage, extraPath);
          const extraSnapshot = await uploadBytes(extraRef, input.files[0]);
          const url = await getDownloadURL(extraSnapshot.ref);
          extraUrls.push(url);
        }
      }

      // 3. Salva dati su Firestore
      await addDoc(collection(db, "prodotti"), {
        nome: name,
        sezione: sezione,
        fotoPrincipale: mainUrl,
        fotoExtra: extraUrls,
        data: new Date(),
      });

      status.innerHTML = "✅ ARTICOLO PUBBLICATO!";
      alert("Prodotto caricato con successo!");

      // Reset campi
      document.getElementById("prod-name").value = "";
      document.getElementById("main-img").value = "";
      extraFiles.forEach((i) => (i.value = ""));
    } catch (e) {
      console.error("Errore:", e);
      status.innerHTML = "❌ ERRORE: " + e.message;
      alert("Errore durante il caricamento. Controlla la console.");
    }
    document.getElementById("upload-btn").disabled = false;
  };
</script>
