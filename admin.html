<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Streetwear Essence</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background: #000;
        color: #fff;
        font-family: "Inter", sans-serif;
        padding: 15px;
      }
      #login-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .login-box {
        background: #0a0a0a;
        padding: 40px;
        border: 1px solid #1a1a1a;
        border-radius: 12px;
        max-width: 350px;
        width: 90%;
      }
      .admin-wrap {
        max-width: 500px;
        margin: 20px auto;
        background: #0a0a0a;
        padding: 25px;
        border: 1px solid #1a1a1a;
        border-radius: 12px;
      }
      h2,
      h1 {
        font-weight: 900;
        color: #39ff14;
        text-transform: uppercase;
        margin-bottom: 20px;
      }
      .label-text {
        font-size: 0.7rem;
        color: #666;
        text-transform: uppercase;
        margin-bottom: 6px;
        display: block;
        font-weight: 800;
      }
      input,
      select {
        width: 100%;
        padding: 14px;
        margin-bottom: 18px;
        background: #111;
        border: 1px solid #222;
        color: #fff;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .photo-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
      }
      .photo-slot {
        background: #111;
        border: 1px solid #222;
        padding: 10px;
        border-radius: 6px;
        text-align: center;
      }
      .photo-slot.main {
        grid-column: span 2;
        border-color: #39ff14;
      }
      .photo-slot input {
        margin-bottom: 0;
        padding: 5px;
        font-size: 10px;
        background: transparent;
        border: none;
      }
      .btn-pubblica,
      .btn-login {
        width: 100%;
        padding: 18px;
        background: #39ff14;
        color: #000;
        border: none;
        font-weight: 900;
        cursor: pointer;
        border-radius: 6px;
        text-transform: uppercase;
      }
      #status {
        margin-top: 12px;
        font-weight: bold;
        color: #39ff14;
        text-align: center;
        font-size: 0.9rem;
      }
      .gestione-prodotti {
        margin-top: 40px;
        border-top: 1px dashed #333;
        padding-top: 20px;
      }
      .prod-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #111;
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 8px;
        border: 1px solid #1a1a1a;
      }
      .prod-item span {
        font-weight: 800;
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      .btn-elimina {
        background: #ff4444;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <div id="login-overlay">
      <div class="login-box">
        <h1>AREA ADMIN</h1>
        <input
          type="password"
          id="pass-field"
          placeholder="PASSWORD"
          style="text-align: center"
        />
        <button class="btn-login" id="login-btn">ENTRA</button>
      </div>
    </div>

    <div class="admin-wrap">
      <h2>📦 CARICA ARTICOLO</h2>
      <input type="text" id="prod-name" placeholder="NOME PRODOTTO" />
      <span class="label-text">Categoria</span>
      <select id="prod-cat">
        <option value="⭐ PREFERITI (Slider)">⭐ PREFERITI (Slider)</option>
        <option value="💎 VETRINA (Griglia)">💎 VETRINA (Griglia)</option>
        <option value="felpe">FELPE</option>
        <option value="tute">TUTE</option>
        <option value="giubbini">GIUBBINI</option>
        <option value="magliette">MAGLIETTE</option>
        <option value="scarpe">SCARPE</option>
        <option value="cappelli">CAPPELLI</option>
      </select>

      <span class="label-text">Gallery Immagini (Max 6)</span>
      <div class="photo-grid">
        <div class="photo-slot main">
          <span class="label-text" style="color: #39ff14"
            >1. Foto Principale</span
          >
          <input type="file" id="img-1" accept="image/*" />
        </div>
        <div class="photo-slot">
          <span class="label-text">2. Dettaglio</span
          ><input type="file" id="img-2" accept="image/*" />
        </div>
        <div class="photo-slot">
          <span class="label-text">3. Dettaglio</span
          ><input type="file" id="img-3" accept="image/*" />
        </div>
        <div class="photo-slot">
          <span class="label-text">4. Dettaglio</span
          ><input type="file" id="img-4" accept="image/*" />
        </div>
        <div class="photo-slot">
          <span class="label-text">5. Dettaglio</span
          ><input type="file" id="img-5" accept="image/*" />
        </div>
        <div class="photo-slot">
          <span class="label-text">6. Dettaglio</span
          ><input type="file" id="img-6" accept="image/*" />
        </div>
      </div>

      <button class="btn-pubblica" id="upload-btn">🚀 PUBBLICA ARTICOLO</button>
      <div id="status"></div>

      <div class="gestione-prodotti">
        <h2 style="font-size: 1rem; color: #555">🛠️ GESTIONE INVENTARIO</h2>
        <div id="lista-prodotti"></div>
      </div>
      <a
        href="index.html"
        style="
          display: block;
          text-align: center;
          color: #555;
          text-decoration: none;
          margin-top: 20px;
          font-size: 12px;
          font-weight: bold;
        "
        >← Torna al sito</a
      >
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
      import {
        getFirestore,
        addDoc,
        collection,
        deleteDoc,
        doc,
        onSnapshot,
        query,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
      import {
        getStorage,
        ref,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBv9ZAOQyljdW41ZDTuxNacXzqegXEvn94",
        authDomain: "streetwearessence2026.firebaseapp.com",
        projectId: "streetwearessence2026",
        storageBucket: "streetwearessence2026.firebasestorage.app",
        messagingSenderId: "926228477709",
        appId: "1:926228477709:web:8a15d11ac26022f1fee244",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const storage = getStorage(app);

      document.getElementById("login-btn").onclick = () => {
        if (document.getElementById("pass-field").value === "essence2026") {
          document.getElementById("login-overlay").style.display = "none";
          caricaLista();
        } else {
          alert("Password errata!");
        }
      };

      function caricaLista() {
        const q = query(collection(db, "prodotti"), orderBy("data", "desc"));
        onSnapshot(q, (snaps) => {
          const lista = document.getElementById("lista-prodotti");
          lista.innerHTML = "";
          snaps.forEach((d) => {
            const p = d.data();
            lista.innerHTML += `<div class="prod-item"><span>${p.nome}</span><button class="btn-elimina" onclick="eliminaProd('${d.id}')">🗑️</button></div>`;
          });
        });
      }

      window.eliminaProd = async (id) => {
        if (confirm("Eliminare definitivamente questo articolo?"))
          await deleteDoc(doc(db, "prodotti", id));
      };

      document.getElementById("upload-btn").onclick = async () => {
        const name = document.getElementById("prod-name").value;
        const catValue = document.getElementById("prod-cat").value;
        const status = document.getElementById("status");
        const inputs = [1, 2, 3, 4, 5, 6].map(
          (i) => document.getElementById(`img-${i}`).files[0],
        );

        if (!name || !inputs[0])
          return alert("Inserisci almeno il nome e la Foto 1!");

        status.innerHTML = "⏳ CARICAMENTO GALLERIA IN CORSO...";
        document.getElementById("upload-btn").disabled = true;

        try {
          const urls = [];
          const cleanName = name.replace(/\s+/g, "-").toLowerCase();

          for (let i = 0; i < inputs.length; i++) {
            if (inputs[i]) {
              const sRef = ref(
                storage,
                `prodotti/${cleanName}_${i}_${Date.now()}`,
              );
              const snap = await uploadBytes(sRef, inputs[i]);
              const url = await getDownloadURL(snap.ref);
              urls.push(url);
            }
          }

          await addDoc(collection(db, "prodotti"), {
            nome: name,
            sezione: catValue,
            fotoPrincipale: urls[0],
            extraFoto: urls.slice(1),
            data: new Date(),
          });

          status.innerHTML = "✅ ARTICOLO PUBBLICATO CON SUCCESSO!";
          setTimeout(() => location.reload(), 1500);
        } catch (e) {
          status.innerHTML = "❌ ERRORE: " + e.message;
          document.getElementById("upload-btn").disabled = false;
        }
      };
    </script>
  </body>
</html>
