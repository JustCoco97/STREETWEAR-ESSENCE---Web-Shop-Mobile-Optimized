<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Admin | Streetwear Essence</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        color: #fff;
        font-family: "Inter", sans-serif;
        padding: 15px;
      }
      .admin-wrap {
        max-width: 500px;
        margin: 20px auto;
        background: #0a0a0a;
        padding: 25px;
        border: 1px solid #1a1a1a;
        border-radius: 12px;
      }
      h2 {
        font-weight: 900;
        color: #39ff14;
        font-size: 1.3rem;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .label-text {
        font-size: 0.7rem;
        color: #666;
        text-transform: uppercase;
        margin-bottom: 6px;
        display: block;
        font-weight: 800;
        letter-spacing: 1px;
      }
      input,
      select {
        width: 100%;
        padding: 14px;
        margin-bottom: 18px;
        background: #111;
        border: 1px solid #222;
        color: #fff;
        font-weight: bold;
        border-radius: 6px;
        font-family: "Inter", sans-serif;
        font-size: 14px;
      }
      .upload-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 18px;
      }
      .upload-grid input {
        margin-bottom: 0;
      }
      .btn-pubblica {
        width: 100%;
        padding: 18px;
        background: #39ff14;
        color: #000;
        border: none;
        font-weight: 900;
        cursor: pointer;
        text-transform: uppercase;
        border-radius: 6px;
        font-size: 15px;
        font-family: "Inter", sans-serif;
      }
      .btn-pubblica:active {
        opacity: 0.8;
      }
      #status {
        margin-top: 12px;
        font-weight: bold;
        color: #39ff14;
        text-align: center;
        font-size: 14px;
        min-height: 20px;
      }
      .gestione-prodotti {
        margin-top: 35px;
        border-top: 1px solid #222;
        padding-top: 20px;
      }
      .item-gestione {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #111;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 6px;
        border-left: 4px solid #39ff14;
        gap: 10px;
      }
      .item-info {
        font-size: 13px;
        font-weight: 900;
        flex: 1;
        word-break: break-word;
      }
      .item-info span {
        color: #666;
        font-size: 10px;
        font-weight: 400;
        display: block;
        margin-top: 3px;
      }
      .btn-elimina {
        background: #ff3131;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 900;
        font-size: 11px;
        white-space: nowrap;
        font-family: "Inter", sans-serif;
      }
      .btn-torna {
        display: block;
        text-align: center;
        color: #555;
        text-decoration: none;
        font-size: 12px;
        margin-top: 20px;
        font-weight: bold;
      }
      .btn-torna:hover {
        color: #fff;
      }
    </style>
  </head>
  <body>
 
    <!-- PANNELLO ADMIN - SI APRE DIRETTAMENTE -->
    <div class="admin-wrap" id="panel">
      <h2>📦 CARICA ARTICOLO</h2>
 
      <span class="label-text">Nome Prodotto</span>
      <input type="text" id="prod-name" placeholder="es: FELPA LOGO TRAP" />
 
      <span class="label-text">Categoria</span>
      <select id="prod-cat">
        <option value="preferiti">⭐ I NOSTRI PREFERITI (Home Slider)</option>
        <option value="vetrina">💎 TUTTI I PRODOTTI (Home Griglia)</option>
        <option value="felpe">FELPE</option>
        <option value="tute">TUTE</option>
        <option value="giubbini">GIUBBINI</option>
        <option value="magliette">MAGLIETTE</option>
        <option value="scarpe">SCARPE</option>
        <option value="cappelli">CAPPELLI</option>
      </select>
 
      <span class="label-text">Foto Copertina *</span>
      <input type="file" id="main-img" accept="image/*" />
 
      <span class="label-text">Altre foto dettagli (max 5)</span>
      <div class="upload-grid">
        <input type="file" class="extra-img" accept="image/*" />
        <input type="file" class="extra-img" accept="image/*" />
        <input type="file" class="extra-img" accept="image/*" />
        <input type="file" class="extra-img" accept="image/*" />
        <input type="file" class="extra-img" accept="image/*" />
      </div>
 
      <button class="btn-pubblica" id="upload-btn">🚀 PUBBLICA SUL SITO</button>
      <div id="status"></div>
 
      <div class="gestione-prodotti">
        <h2>🗂 GESTISCI PRODOTTI</h2>
        <div id="lista-prodotti"></div>
      </div>
 
      <a href="index.html" class="btn-torna">← Torna al sito</a>
    </div>
 
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
      import {
        getFirestore,
        addDoc,
        collection,
        deleteDoc,
        doc,
        onSnapshot,
        query,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";
      import {
        getStorage,
        ref,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-storage.js";
 
      const firebaseConfig = {
        apiKey: "AIzaSyBv9ZAOQyljdW41ZDTuxNacXzqegXEvn94",
        authDomain: "streetwearessence2026.firebaseapp.com",
        projectId: "streetwearessence2026",
        storageBucket: "streetwearessence2026.firebasestorage.app",
        messagingSenderId: "926228477709",
        appId: "1:926228477709:web:8a15d11ac26022f1fee244",
      };
 
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const storage = getStorage(app);
 
      // CARICA LISTA PRODOTTI SUBITO
      function caricaProdotti() {
        const q = query(collection(db, "prodotti"), orderBy("data", "desc"));
        onSnapshot(q, (snapshot) => {
          const lista = document.getElementById("lista-prodotti");
          lista.innerHTML = "";
          if (snapshot.empty) {
            lista.innerHTML = "<p style='color:#555; font-size:13px;'>Nessun prodotto caricato.</p>";
            return;
          }
          snapshot.forEach((docSnap) => {
            const p = docSnap.data();
            lista.innerHTML += `
              <div class="item-gestione">
                <div class="item-info">
                  ${p.nome}
                  <span>${p.sezione.toUpperCase()}</span>
                </div>
                <button class="btn-elimina" onclick="eliminaProdotto('${docSnap.id}')">ELIMINA</button>
              </div>`;
          });
        });
      }
 
      caricaProdotti();
 
      // ELIMINA PRODOTTO
      window.eliminaProdotto = async (id) => {
        if (confirm("Vuoi davvero eliminare questo prodotto?")) {
          await deleteDoc(doc(db, "prodotti", id));
        }
      };
 
      // PUBBLICA PRODOTTO
      document.getElementById("upload-btn").onclick = async () => {
        const status = document.getElementById("status");
        const name = document.getElementById("prod-name").value.trim();
        const sezione = document.getElementById("prod-cat").value;
        const mainImgFile = document.getElementById("main-img").files[0];
        const extraFiles = document.querySelectorAll(".extra-img");
 
        if (!name || !mainImgFile) {
          alert("⚠️ Nome e Foto copertina sono obbligatori!");
          return;
        }
 
        status.innerHTML = "⏳ CARICAMENTO IN CORSO...";
        document.getElementById("upload-btn").disabled = true;
 
        try {
          const mainRef = ref(storage, `prodotti/${Date.now()}_main`);
          await uploadBytes(mainRef, mainImgFile);
          const mainUrl = await getDownloadURL(mainRef);
 
          let extraUrls = [];
          for (let input of extraFiles) {
            if (input.files[0]) {
              const extraRef = ref(storage, `prodotti/${Date.now()}_${Math.random()}`);
              await uploadBytes(extraRef, input.files[0]);
              const url = await getDownloadURL(extraRef);
              extraUrls.push(url);
            }
          }
 
          await addDoc(collection(db, "prodotti"), {
            nome: name,
            sezione: sezione,
            fotoPrincipale: mainUrl,
            fotoExtra: extraUrls,
            data: new Date(),
          });
 
          status.innerHTML = "✅ ARTICOLO PUBBLICATO!";
          document.getElementById("prod-name").value = "";
          document.getElementById("main-img").value = "";
          extraFiles.forEach((i) => (i.value = ""));
        } catch (e) {
          status.innerHTML = "❌ ERRORE: " + e.message;
          console.error(e);
        }
 
        document.getElementById("upload-btn").disabled = false;
      };
    </script>
  </body>
</html
