<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Streetwear Essence</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet" />
    <style>
      /* FIX VELOCE IMMAGINI */
      img { max-width: 100%; height: auto; display: block; }
      .slider-track img { width: 250px; height: 350px; object-fit: cover; border-radius: 15px; }

      /* IL TASTO CHE VOLEVI - BASSO SINISTRA */
      .mobile-admin-btn {
        position: fixed;
        bottom: 15px;
        left: 15px;
        z-index: 99999;
        background: #bc13fe;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        text-transform: uppercase;
      }

      /* LOGIN MODAL */
      .login-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        z-index: 100000;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .login-box {
        background: #111;
        padding: 30px;
        border-radius: 15px;
        border: 1px solid #bc13fe;
        width: 80%;
      }
      .login-box input {
        width: 100%;
        padding: 15px;
        margin: 10px 0;
        background: #000;
        color: #fff;
        border: 1px solid #333;
        border-radius: 8px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body class="no-scroll">

    <button class="mobile-admin-btn" onclick="document.getElementById('login-box').style.display='flex'">
      ADMIN
    </button>

    <div id="login-box" class="login-overlay">
      <div class="login-box">
        <h2 style="color:#bc13fe; margin-top:0;">LOGIN ADMIN</h2>
        <input type="password" id="pass-field" placeholder="Password">
        <button onclick="checkAdmin()" style="width:100%; padding:15px; background:#bc13fe; color:white; border:none; border-radius:8px; font-weight:900;">ENTRA</button>
        <p onclick="document.getElementById('login-box').style.display='none'" style="color:#555; text-align:center; margin-top:15px;">Chiudi</p>
      </div>
    </div>

    <div id="intro">
      <div class="intro-content">
        <div class="img-frame-poster"><img src="Streetwearprofilo.jpeg" class="intro-img-poster" /></div>
        <h1 class="intro-text">RIFATTI GLI OCCHI 😉</h1>
        <div class="loader-container"><div class="loader-bar"></div></div>
      </div>
    </div>

    <div id="site-content">
      <header>
        <div class="header-container">
          <div class="logo-wrapper" onclick="location.href='index.html'">
            <img src="Streetwearprofilo.jpeg" class="header-logo-img" />
            <div class="logo">STREETWEAR<span>ESSENCE</span></div>
          </div>
          <nav>
            <a href="categoria.html?tipo=felpe" class="filter-btn">FELPE</a>
            <a href="categoria.html?tipo=tute" class="filter-btn">TUTE</a>
            <a href="categoria.html?tipo=giubbini" class="filter-btn">GIUBBINI</a>
            <a href="categoria.html?tipo=magliette" class="filter-btn">MAGLIETTE</a>
            <a href="categoria.html?tipo=scarpe" class="filter-btn">SCARPE</a>
          </nav>
        </div>
      </header>

      <section class="featured-section">
        <h2 class="section-title">I NOSTRI PREFERITI 🔥</h2>
        <div class="slider-container"><div class="slider-track" id="slider-track"></div></div>
      </section>

      <div class="all-products-banner">
        <h2 class="all-products-title">TUTTI I PRODOTTI 💎</h2>
      </div>

      <section class="categories-section">
        <div class="categories-grid" id="categories-grid"></div>
      </section>

      <footer class="main-footer">
        <p>&copy; 2026 STREETWEAR ESSENCE</p>
      </footer>
    </div>

    <div id="product-modal" class="modal">
      <span class="close-modal" onclick="closeProduct()">&times;</span>
      <div class="modal-content">
        <div class="main-img-container"><img id="modal-main-img" src="" /></div>
        <div id="modal-thumbs" class="thumb-container"></div>
        <div class="modal-info">
          <h2 id="modal-product-name"></h2>
          <a href="#" id="modal-wa-btn" class="wa-order-btn" target="_blank">WHATSAPP ✅</a>
        </div>
      </div>
    </div>

    <script type="module" src="databasestreet.js"></script>
    <script>
      function checkAdmin() {
        if(document.getElementById('pass-field').value === "essence2026") {
          window.location.href = "admin.html";
        } else { alert("Sbagliata!"); }
      }
      function openProduct(name, mainImg, extraJson) {
        const extra = JSON.parse(decodeURIComponent(extraJson));
        document.getElementById("modal-product-name").innerText = name;
        document.getElementById("modal-main-img").src = mainImg;
        document.getElementById("modal-wa-btn").href = "https://wa.me/393273187853?text=Info: " + name;
        const thumbContainer = document.getElementById("modal-thumbs");
        thumbContainer.innerHTML = "";
        [mainImg, ...extra].forEach(url => {
          if(url) {
            const img = document.createElement("img");
            img.src = url; img.className = "thumb-img";
            img.onclick = () => { document.getElementById("modal-main-img").src = url; };
            thumbContainer.appendChild(img);
          }
        });
        document.getElementById("product-modal").style.display = "block";
      }
      function closeProduct() { document.getElementById("product-modal").style.display = "none"; }
      window.onload = () => {
        setTimeout(() => {
          document.getElementById("intro").style.display = "none";
          document.getElementById("site-content").style.opacity = "1";
          document.body.classList.remove("no-scroll");
        }, 4000);
      };
    </script>
  </body>
</html>
